name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      GODADDY_ENDPOINT: ote
      GODADDY_API_KEY: ${{ secrets.GODADDY_OTE_API_KEY }}
      GODADDY_API_SECRET: ${{ secrets.GODADDY_OTE_API_SECRET }}
      GODADDY_TEST_DOMAIN: ${{ secrets.GODADDY_TEST_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Run unit and integration tests
        run: go test ./...

      - name: Build provider
        run: go build ./...

  terraform-smoke:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      TF_ACC: "1"
      GODADDY_ENDPOINT: ote
      GODADDY_API_KEY: ${{ secrets.GODADDY_OTE_API_KEY }}
      GODADDY_API_SECRET: ${{ secrets.GODADDY_OTE_API_SECRET }}
      GODADDY_TEST_DOMAIN: ${{ secrets.GODADDY_TEST_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Check smoke test secrets
        id: smoke-secrets
        shell: bash
        run: |
          if [ -n "${GODADDY_API_KEY}" ] && [ -n "${GODADDY_API_SECRET}" ] && [ -n "${GODADDY_TEST_DOMAIN}" ]; then
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Terraform smoke tests
        if: steps.smoke-secrets.outputs.run_smoke == 'true'
        run: go test ./test/terratest/... -v -count=1

      - name: Skip Terraform smoke tests
        if: steps.smoke-secrets.outputs.run_smoke != 'true'
        run: echo "Skipping Terraform smoke tests because required GoDaddy secrets are not all present."
