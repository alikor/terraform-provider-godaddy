name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute build version
        id: version
        run: echo "value=$(./tools/version.sh)" >> "$GITHUB_OUTPUT"

      - name: Docker CI targets
        run: make docker-ci VERSION=${{ steps.version.outputs.value }}

  terraform-smoke:
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Compute build version
        id: version
        run: echo "value=$(./tools/version.sh)" >> "$GITHUB_OUTPUT"

      - name: Run Terraform smoke tests
        run: make docker-smoke VERSION=${{ steps.version.outputs.value }}
